# Obsoleto: usar traefik/dynamic/huertas.yml (Traefik carga el directorio dynamic/).
# Este archivo se mantiene solo como referencia; el compose monta dynamic/huertas.yml.

http:
  routers:
    nosignal-api:
      rule: Host(`api.huertas.nosignal.site`)
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: nosignal-api

    nosignal-frontend:
      rule: Host(`huertas.nosignal.site`)
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: nosignal-frontend

  services:
    nosignal-api:
      loadBalancer:
        servers:
          - url: http://nosignal-backend:8000

    nosignal-frontend:
      loadBalancer:
        servers:
          - url: http://nosignal-frontend:80
